<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1'><style>body{font-family:Arial;background:#f4f6f9;padding:15px;}.box{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 0 5px #ccc;}.row{padding:10px;border-bottom:1px solid #eee;font-size:15px;line-height:1.5;}.ime{font-size:18px;font-weight:bold;}a{text-decoration:none;color:black;}</style></head><body><div class='box'><b>Popis zaposlenika – LUDBREG</b></div><input type='text' id='myInput' onkeyup='myFunction()' placeholder='Pretraži ime...' style='width:100%;padding:10px;font-size:16px;margin-bottom:10px;'><div class='box'><div class='row'><div class='ime'>GRŽANIĆ MARIN</div><b>PRIORITETI:</b><table style='width:100%;border-collapse:collapse;margin-top:5px;margin-bottom:8px;'></table>Ugovor: neodređeno vrijeme<br>Stručna sprema: <br>Vozačka: <br><span style='color:red'><b>ZAINTERESIRAN ZA OTPREMNINU</b></span><br><hr style='margin-top:10px;margin-bottom:10px;'></div></div><a href='index.html'>‹ Povratak</a><script>function myFunction() {var input = document.getElementById('myInput').value.toUpperCase();var rows = document.getElementsByClassName('row');for (var i = 0; i < rows.length; i++) {var txtValue = rows[i].textContent || rows[i].innerText;if (txtValue.toUpperCase().indexOf(input) > -1) {rows[i].style.display = '';} else {rows[i].style.display = 'none';}}}</script></body></html>
